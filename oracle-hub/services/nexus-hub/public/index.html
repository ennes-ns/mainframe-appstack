<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanctum Chat</title>
    <style>
        body { font-family: sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-container { flex-grow: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 8px; max-width: 70%; line-height: 1.4; }
        .message.oracle { background-color: #1e1e24; align-self: flex-start; border-left: 4px solid #bb86fc; }
        .message.director { background-color: #bb86fc; color: #000; align-self: flex-end; }
        #input-container { display: flex; padding: 10px; background-color: #1e1e24; }
        #chat-input { flex-grow: 1; padding: 10px; border: none; border-radius: 4px; background-color: #2c2c2c; color: #fff; font-size: 16px; }
        #send-btn { padding: 10px 20px; border: none; background-color: #bb86fc; color: #000; font-weight: bold; border-radius: 4px; margin-left: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="chat-container"></div>
    <div id="input-container">
        <input type="text" id="chat-input" placeholder="Speak to the Oracle..." autocomplete="off" />
        <button id="send-btn">Send</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const chatContainer = document.getElementById(chat-container);
        const input = document.getElementById(chat-input);
        const sendBtn = document.getElementById(send-btn);

        function appendMessage(sender, text) {
            const msgDiv = document.createElement(div);
            msgDiv.classList.add(message, sender.toLowerCase() === oracle ? oracle : director);
            msgDiv.textContent = text;
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        socket.on(message, (data) => {
            appendMessage(data.sender, data.text);
        });

        function sendMessage() {
            const text = input.value.trim();
            if (text) {
                appendMessage(Director, text);
                socket.emit(chatMessage, text);
                input.value = ;
            }
        }

        sendBtn.addEventListener(click, sendMessage);
        input.addEventListener(keypress, (e) => { if (e.key === Enter) sendMessage(); });
    </script>
</body>
</html>
