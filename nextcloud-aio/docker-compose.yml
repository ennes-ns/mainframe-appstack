services:
  nextcloud-aio-master:
    image: nextcloud/all-in-one:latest
    container_name: nextcloud-aio-mastercontainer
    restart: unless-stopped
    environment:
      - APACHE_PORT=11000
      - APACHE_IP_BINDING=0.0.0.0
      - NEXTCLOUD_DATADIR=/home/ennes/docker/nextcloud-aio/data
      - NEXTCLOUD_UPLOAD_LIMIT=10G
      - APACHE_BODY_LIMIT=0
      - COLLABORA_ADDITIONAL_PARAMETERS=--o:net.max_message_size=104857600
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - nextcloud_aio_mastercontainer:/mnt/docker-aio-config
    networks:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.aio.rule=Host(`aio.mainframe.net`)"
      - "traefik.http.routers.aio.middlewares=tailscale-only@file"
      - "traefik.http.services.aio.loadbalancer.server.port=8080"

volumes:
  nextcloud_aio_mastercontainer:
    name: nextcloud_aio_mastercontainer

networks:
  backend:
    external: true
