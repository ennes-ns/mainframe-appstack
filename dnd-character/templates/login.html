<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grave-Singer - Identity Required</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="/static/style.css?v=20">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="login-view">
    <div class="sheet-container login-card">
        <header class="sheet-header">
            <h1 class="glow-text">Lazarus</h1>
            <p class="subtitle">Whisper the secret codeword to enter.</p>
        </header>

        <form hx-post="/login" hx-target="#login-error" hx-swap="innerHTML" class="login-form">
            <!-- Hidden username field to satisfy browser autofill managers -->
            <input type="text" name="username" value="lazarus" style="display:none;" autocomplete="username">
            
            <div class="input-group">
                <label for="password">Codeword</label>
                <input type="password" id="password" name="password" autocomplete="current-password" placeholder="The codeword..." required autofocus>
                <div id="login-error"></div>
            </div>
            <button type="submit" id="login-submit">Enter</button>
        </form>
    </div>
</body>
</html>
